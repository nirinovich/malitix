# ──────────────────────────────────────────────────────────────
# Malitix – Hybrid SSG + SSR deployment
# ──────────────────────────────────────────────────────────────
# - nginx:  serves pre-rendered pages + static assets directly
# - app:    Node.js server for SSR routes (blog, admin, etc.)
# ──────────────────────────────────────────────────────────────

services:
  # ── Node.js SSR server ────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app # Stage 4
    restart: unless-stopped
    expose:
      - "3000" # only visible to nginx, not host
    environment:
      - NODE_ENV=production
      - VITE_SANITY_PROJECT_ID=tuac272n
      - VITE_SANITY_DATASET=production
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── nginx reverse proxy ──────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx # Stage 5
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy
